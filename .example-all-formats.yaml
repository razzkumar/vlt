# Simple test configuration demonstrating file storage
# ===== .vlt.text.yaml ======
vault:
  addr: "http://localhost:8200"

kv:
  mount: home

# Global file storage settings
files:
  output_dir: "./test_files"
  default_mode: "0644"
  create_dirs: true

secrets:
  # Regular environment variables
  - path: test/config
  
  # File with custom path and permissions
  - path: test/certificates
    key: ssl_cert.pem
    file:
      path: "~/certs/ssl.pem"
      mode: "0600"
      create_dir: true
  
  # File using global settings
  - path: test/keys
    key: api_key.txt
    file: {}  # Uses defaults: ./test_files/api_key.txt with mode 0644