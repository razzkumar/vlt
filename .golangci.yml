version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - gosec
  settings:
    gosec:
      excludes:
        - G304 # File path provided as taint input (we validate paths)
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
