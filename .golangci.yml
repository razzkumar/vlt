linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - gosec

linters-settings:
  gosec:
    excludes:
      - G304 # File path provided as taint input (we validate paths)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
